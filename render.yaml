services:
  - type: web
    name: homework-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SUPERVISOR_IDS
        sync: false
      - key: DB_PATH
        value: bot_data.db
      - key: WEBHOOK_URL
        value: https://iranunibot.onrender.com
      - key: PORT
        value: "10000"
